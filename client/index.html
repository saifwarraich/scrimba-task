<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrimba Lesson Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page:    #0d1117;
      --bg-card:    #161b22;
      --bg-input:   #1e2530;
      --bg-overlay: #0d1117cc;
      --border:     #2d3748;
      --border-sub: #1e2530;
      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --text-dim:       #484f58;
      --accent-purple: #6c4ff6;
      --accent-purple-hover: #7c5ff8;
      --accent-green:  #4ade80;
      --accent-blue:   #58a6ff;
      --accent-pink:   #f778ba;
      --accent-orange: #f0883e;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--text-primary);
    }
    .logo-icon {
      color: var(--accent-purple);
      font-size: 22px;
      line-height: 1;
    }
    .logo-text {
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    /* Hero */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px 40px;
      position: relative;
      overflow: hidden;
    }

    /* Animated orb background */
    .orb {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108, 79, 246, 0.12) 0%, rgba(88, 166, 255, 0.06) 50%, transparent 70%);
      filter: blur(60px);
      animation: orbFloat 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.97); }
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 720px;
      width: 100%;
    }

    .hero h1 {
      font-size: clamp(42px, 6vw, 64px);
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero h1 span {
      background: linear-gradient(135deg, #6c4ff6 0%, #58a6ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* Search input */
    .input-wrapper {
      position: relative;
      max-width: 680px;
      width: 100%;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 18px 160px 18px 20px;
      font-size: 16px;
      font-family: var(--font-sans);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      outline: none;
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--accent-purple);
      box-shadow: 0 0 0 3px rgba(108, 79, 246, 0.12);
    }

    .generate-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      padding: 10px 20px;
      background: var(--accent-purple);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: background 150ms ease, transform 150ms ease;
      white-space: nowrap;
    }

    .generate-btn:hover { background: var(--accent-purple-hover); }
    .generate-btn:active { transform: translateY(-50%) scale(0.97); }

    .generate-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Example pills */
    .examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      max-width: 680px;
    }

    .pill {
      padding: 7px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 100px;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: border-color 150ms ease, color 150ms ease, background 150ms ease;
    }

    .pill:hover {
      border-color: var(--accent-purple);
      color: var(--text-primary);
      background: rgba(108, 79, 246, 0.08);
    }

    /* Error */
    .error-msg {
      margin-top: 12px;
      color: var(--accent-orange);
      font-size: 14px;
      min-height: 20px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* Loading state overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--bg-overlay);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .loading-overlay.active {
      display: flex;
    }
    .loading-overlay p {
      color: var(--text-secondary);
      font-size: 15px;
    }
    .dot-spinner {
      display: flex;
      gap: 8px;
    }
    .dot-spinner span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent-purple);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot-spinner span:nth-child(2) { animation-delay: 0.2s; }
    .dot-spinner span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">Scrimba Lesson Engine</span>
    </a>
  </header>

  <main>
    <div class="orb"></div>

    <div class="hero">
      <h1>Learn <span>anything.</span></h1>
      <p class="hero-subtitle">Ask a question. Watch it explained.</p>

      <div class="input-wrapper">
        <input
          class="search-input"
          id="queryInput"
          type="text"
          placeholder="e.g. Why is the sky blue?"
          autocomplete="off"
          maxlength="200"
        />
        <button class="generate-btn" id="generateBtn">Generate →</button>
      </div>

      <div class="examples">
        <button class="pill" data-query="Why is the sky blue?">Why is the sky blue?</button>
        <button class="pill" data-query="How does the Norwegian parliament work?">How does the Norwegian parliament work?</button>
        <button class="pill" data-query="What's the difference between a hash map and a B-tree?">Hash map vs B-tree</button>
      </div>

      <div class="error-msg" id="errorMsg"></div>
    </div>
  </main>

  <footer>Powered by Claude + ElevenLabs</footer>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="dot-spinner">
      <span></span><span></span><span></span>
    </div>
    <p>Creating your lesson...</p>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
