<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scrimba Lesson Engine — Player</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-page:    #0d1117;
      --bg-card:    #161b22;
      --bg-input:   #1e2530;
      --bg-overlay: #0d1117cc;
      --border:     #2d3748;
      --border-sub: #1e2530;
      --text-primary:   #e6edf3;
      --text-secondary: #8b949e;
      --text-dim:       #484f58;
      --accent-purple: #6c4ff6;
      --accent-purple-hover: #7c5ff8;
      --accent-green:  #4ade80;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius-sm: 6px;
      --radius-md: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Topbar */
    #topbar {
      height: 48px;
      min-height: 48px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-sub);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: var(--text-primary);
      flex-shrink: 0;
    }
    .logo-icon { color: var(--accent-purple); font-size: 18px; }
    .logo-text { font-size: 14px; font-weight: 500; }

    #queryDisplay {
      flex: 1;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
      margin: 0 auto;
    }

    #newLessonBtn {
      flex-shrink: 0;
      padding: 6px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      transition: border-color 150ms, color 150ms;
    }
    #newLessonBtn:hover { border-color: var(--accent-purple); color: var(--text-primary); }

    #reconnectBtn {
      display: none;
      flex-shrink: 0;
      padding: 5px 12px;
      background: var(--accent-purple);
      border: none;
      border-radius: var(--radius-sm);
      color: white;
      font-size: 12px;
      font-family: var(--font-sans);
      cursor: pointer;
    }

    /* Viewport */
    #viewport {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 16:9 letterbox container — scenes always render at the ratio Claude targets */
    #sceneBox {
      position: relative;
      aspect-ratio: 16 / 9;
      width: min(100%, calc(100vh * 16 / 9));
      max-height: 100%;
      background: var(--bg-page);
      overflow: hidden;
    }

    #sceneBox iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 400ms ease;
    }

    /* Loading state */
    #loadingState {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 5;
    }

    .dot-spinner {
      display: flex;
      gap: 10px;
    }
    .dot-spinner span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent-purple);
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot-spinner span:nth-child(2) { animation-delay: 0.2s; }
    .dot-spinner span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dotPulse {
      0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    #loadingTitle {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    #loadingStage {
      font-size: 14px;
      color: var(--text-secondary);
      transition: opacity 400ms ease;
    }

    /* Controls bar */
    #controls {
      height: 72px;
      min-height: 72px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0 16px;
    }

    /* Track */
    #track {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 10px 0 6px;
      height: 29px;
    }

    .track-segment {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      cursor: default;
      position: relative;
      overflow: hidden;
    }

    .track-segment.played {
      background: rgba(230, 237, 243, 0.4);
      cursor: pointer;
    }

    .track-segment.active {
      background: rgba(230, 237, 243, 0.2);
      cursor: pointer;
    }

    .track-segment.pending {
      background: var(--border);
      cursor: pointer;
    }

    .track-segment.loading {
      background: linear-gradient(90deg, var(--border) 25%, var(--bg-input) 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s linear infinite;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .track-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0%;
      background: white;
      border-radius: 2px;
      transition: width linear;
    }

    /* Buttons row */
    #btnRow {
      display: flex;
      align-items: center;
      height: 43px;
      gap: 0;
    }

    .ctrl-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 16px;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: var(--radius-sm);
      transition: color 150ms, background 150ms;
      font-family: var(--font-sans);
      line-height: 1;
    }
    .ctrl-btn:hover { color: var(--text-primary); background: var(--bg-input); }
    .ctrl-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .ctrl-btn:disabled:hover { color: var(--text-secondary); background: transparent; }

    #playPauseBtn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent-purple);
      color: white;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      margin: 0 6px;
      transition: background 150ms, transform 100ms;
    }
    #playPauseBtn:hover { background: var(--accent-purple-hover); color: white; }
    #playPauseBtn:active { transform: scale(0.94); }

    .spacer { flex: 1; }

    #sceneCounter {
      font-size: 13px;
      color: var(--text-secondary);
      margin-right: 12px;
    }
    #timeDisplay {
      font-size: 13px;
      color: var(--text-dim);
      font-family: var(--font-mono);
    }

    /* Tooltip */
    [data-tooltip] { position: relative; }
    [data-tooltip]:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 12px;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="topbar">
    <a href="/" class="logo">
      <span class="logo-icon">◈</span>
      <span class="logo-text">Scrimba Lesson Engine</span>
    </a>
    <div id="queryDisplay"></div>
    <button id="reconnectBtn">↺ Reconnect</button>
    <button id="newLessonBtn" onclick="location.href='/'">New lesson</button>
  </div>

  <div id="viewport">
  <div id="sceneBox">
    <div id="loadingState">
      <div class="dot-spinner">
        <span></span><span></span><span></span>
      </div>
      <div id="loadingTitle">Generating your lesson</div>
      <div id="loadingStage">Writing script...</div>
    </div>
  </div>
  </div>

  <div id="controls">
    <div id="track"></div>
    <div id="btnRow">
      <button class="ctrl-btn" id="restartBtn" title="Restart">⟨⟨</button>
      <button class="ctrl-btn" id="prevBtn" title="Previous">◀</button>
      <button class="ctrl-btn" id="playPauseBtn" title="Play/Pause">▶</button>
      <button class="ctrl-btn" id="nextBtn" title="Next" data-tooltip="">▶</button>
      <button class="ctrl-btn" id="skipEndBtn" title="Skip to end" disabled>▶▶</button>
      <div class="spacer"></div>
      <span id="sceneCounter">—</span>
      <span id="timeDisplay">0:00</span>
    </div>
  </div>

  <script type="module" src="/src/player.ts"></script>
</body>
</html>
